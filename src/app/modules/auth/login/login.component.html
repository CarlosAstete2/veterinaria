<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow" style="width: 380px;">
    <div class="card-body p-4">
      <h4 class="card-title text-center mb-1 text-primary fw-bold">🐾 VetCare</h4>
      <p class="text-center text-muted mb-4">Sistema de gestión veterinaria</p>

      <div *ngIf="error" class="alert alert-danger py-2">Usuario o contraseña incorrectos.</div>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input formControlName="usuario" type="text" class="form-control"
            [class.is-invalid]="form.get('usuario')!.invalid && form.get('usuario')!.touched" />
          <div class="invalid-feedback">Campo requerido.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input formControlName="clave" type="password" class="form-control"
            [class.is-invalid]="form.get('clave')!.invalid && form.get('clave')!.touched" />
          <div class="invalid-feedback">Mínimo 6 caracteres.</div>
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid">Ingresar</button>
      </form>

      <p class="text-center text-muted mt-3 small">Demo: admin / admin123</p>
    </div>
  </div>
</div>
