<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Mascotas registradas</h4>
    <a routerLink="/mascotas/nueva" class="btn btn-primary btn-sm">+ Nueva mascota</a>
  </div>

  <input type="text" class="form-control mb-3" placeholder="Buscar por nombre, especie o propietario..."
    [(ngModel)]="busqueda" />

  <div *ngIf="filtradas.length === 0" class="text-center text-muted py-5">
    No hay mascotas registradas.
  </div>

  <div class="row g-3">
    <div class="col-md-6 col-lg-4" *ngFor="let m of filtradas">
      <app-mascota-card
        [mascota]="m"
        (eliminar)="onEliminar($event)"
        (editar)="onEditar($event)"
        (verHistorial)="onVerHistorial($event)">
      </app-mascota-card>
    </div>
  </div>
</div>
