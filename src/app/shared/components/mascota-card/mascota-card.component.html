<div class="card h-100 shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h6 class="card-title mb-0 fw-bold">{{ mascota.nombre }}</h6>
      <span class="badge bg-primary">{{ mascota.especie }}</span>
    </div>
    <p class="mb-1 small text-muted">Raza: {{ mascota.raza }}</p>
    <p class="mb-1 small"><strong>Dueño:</strong> {{ mascota.propietarioNombre }}</p>
    <p class="mb-0 small text-muted">{{ mascota.propietarioTelefono }}</p>
  </div>
  <div class="card-footer d-flex gap-1 flex-wrap py-2">
    <button class="btn btn-outline-secondary btn-sm" (click)="editar.emit(mascota.id)">Editar</button>
    <button class="btn btn-outline-info btn-sm" (click)="verHistorial.emit(mascota.id)">Historial</button>
    <button class="btn btn-outline-danger btn-sm ms-auto" (click)="eliminar.emit(mascota.id)">Eliminar</button>
  </div>
</div>
